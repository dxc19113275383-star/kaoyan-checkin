# Netlify 部署配置 — V7.0 起改为 Vite 构建产物
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# AI 代理：前端调用 /api/chat → DeepSeek 代理函数
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

# SPA / PWA 回退：所有未命中路由回到 index.html（现役单文件应用入口）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
