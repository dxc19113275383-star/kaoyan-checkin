<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考研每日打卡 · 在职/全职双阶段</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root {
    --color-background-primary:#fff; --color-background-secondary:#f5f4f0; --color-background-tertiary:#faf9f6;
    --color-background-info:#E6F1FB; --color-background-warning:#FAEEDA; --color-background-success:#E1F5EE;
    --color-text-primary:#1a1a18; --color-text-secondary:#5F5E5A; --color-text-tertiary:#9b9a94;
    --color-text-info:#185FA5; --color-text-warning:#854F0B; --color-text-success:#0F6E56;
    --color-border-tertiary:rgba(0,0,0,.12); --color-border-secondary:rgba(0,0,0,.22);
    --color-border-warning:rgba(133,79,11,.4); --color-border-success:rgba(15,110,86,.4);
    --border-radius-md:8px; --border-radius-lg:12px;
    --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary:#26251f; --color-background-secondary:#302f28; --color-background-tertiary:#1d1c17;
      --color-text-primary:#f0efe9; --color-text-secondary:#b0afa8; --color-text-tertiary:#76756f;
      --color-border-tertiary:rgba(255,255,255,.14); --color-border-secondary:rgba(255,255,255,.26);
    }
    body { background:#1d1c17; }
  }
  body { background:var(--color-background-tertiary); margin:0; padding:1.5rem 1rem; color:var(--color-text-primary); }
  .wrap { max-width: 640px; margin: 0 auto; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 10px; }
  .muted { color: var(--color-text-secondary); }
  .tiny { font-size: 13px; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .task { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; }
  .task:last-child { border-bottom: none; }
  .box { width: 22px; height: 22px; flex-shrink: 0; border-radius: 6px; border: 1.5px solid var(--color-border-secondary); display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: background .15s, border-color .15s; }
  .box.done { background: var(--color-text-info); border-color: var(--color-text-info); }
  .box i { color: #fff; font-size: 15px; opacity: 0; }
  .box.done i { opacity: 1; }
  .task .label { font-size: 15px; line-height: 1.4; }
  .task .focus { font-size: 12.5px; color: var(--color-text-secondary); margin-top: 3px; line-height: 1.4; }
  .task.done .label { color: var(--color-text-tertiary); text-decoration: line-through; }
  .task.done .focus { color: var(--color-text-tertiary); }
  .tag { font-size: 11px; padding: 1px 7px; border-radius: 6px; margin-left: 6px; vertical-align: 1.5px; white-space: nowrap; }
  .t-eng { background: #E6F1FB; color: #0C447C; }
  .t-math { background: #FAEEDA; color: #854F0B; }
  .t-rev { background: #E1F5EE; color: #0F6E56; }
  .t-logic { background: #EEEDFE; color: #3C3489; }
  .t-write { background: #FBEAF0; color: #72243E; }
  .t-major { background: #FAECE7; color: #712B13; }
  .t-pol { background: #FCEBEB; color: #791F1F; }
  .bartrack { height: 7px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden; }
  .barfill { height: 100%; background: var(--color-text-info); width: 0%; transition: width .35s; }
  .navbtn { padding: 4px 10px; font-size: 13px; background:transparent; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); color:inherit; cursor:pointer; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: .7rem .5rem; text-align: center; }
  .stat .n { font-size: 21px; font-weight: 500; }
  .stat .l { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .replan { background: var(--color-background-warning); border: 0.5px solid var(--color-border-warning); border-radius: var(--border-radius-md); padding: .8rem 1rem; font-size: 14px; line-height: 1.55; color: var(--color-text-warning); margin-top: .6rem; }
  .good { background: var(--color-background-success); border: 0.5px solid var(--color-border-success); border-radius: var(--border-radius-md); padding: .8rem 1rem; font-size: 14px; color: var(--color-text-success); margin-top: .6rem; }
  .seg { display: flex; gap: 0; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; }
  .seg button { border: none; border-radius: 0; border-right: 0.5px solid var(--color-border-secondary); font-size: 13px; padding: 5px 0; flex: 1; background: transparent; color:inherit; cursor:pointer; }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: var(--color-text-info); color: #fff; }
  .phaseToggle { display: flex; gap: 0; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; margin-bottom: 1rem; }
  .phaseToggle button { border: none; border-radius: 0; border-right: 0.5px solid var(--color-border-secondary); font-size: 14px; padding: 9px 0; flex: 1; background: transparent; font-weight: 500; color:inherit; cursor:pointer; }
  .phaseToggle button:last-child { border-right: none; }
  .phaseToggle button.on { background: var(--color-text-primary); color: var(--color-background-primary); }
  h2 { font-size: 18px; font-weight: 500; margin: 0; }
  .phase { font-size: 12px; color: var(--color-text-secondary); }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  .monthbox { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: .7rem .85rem; margin: 10px 0 0; font-size: 13px; line-height: 1.5; }
  a { color: var(--color-text-info); }
</style>
</head>
<body>
<div class="wrap">
  <h2 class="sr-only">考研备考每日打卡工具，含在职与全职两个阶段</h2>
  <div class="phaseToggle" id="phaseToggle">
    <button data-p="0" class="on">在职打基础（约8个月）</button>
    <button data-p="1">全职冲刺（约11个月）</button>
  </div>
  <div class="card">
    <div class="row" style="justify-content: space-between; margin-bottom: 4px;">
      <div>
        <h2 id="weekTitle">第 1 周</h2>
        <div class="phase" id="phaseLabel"></div>
      </div>
      <div class="row">
        <button class="navbtn" id="prevWk" aria-label="上一周"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
        <button class="navbtn" id="nextWk" aria-label="下一周"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
      </div>
    </div>
    <div class="monthbox" id="monthGoal"></div>
    <div class="seg" id="daySeg" style="margin-top: 12px;"></div>
  </div>
  <div class="card">
    <div class="row" style="justify-content: space-between; margin-bottom: 10px;">
      <span class="tiny muted" id="dayLabel">周一</span>
      <span class="tiny muted" id="dayCount">0 / 4</span>
    </div>
    <div id="taskList"></div>
    <div class="bartrack" style="margin-top: 14px;"><div class="barfill" id="dayBar"></div></div>
    <div id="feedback"></div>
  </div>
  <div class="card">
    <div class="row" style="gap: 8px;">
      <div class="stat" style="flex:1;"><div class="n" id="sWeek">0%</div><div class="l">本周完成率</div></div>
      <div class="stat" style="flex:1;"><div class="n" id="sStreak">0</div><div class="l">连续打卡天</div></div>
      <div class="stat" style="flex:1;"><div class="n" id="sTotal">0</div><div class="l">累计完成</div></div>
    </div>
  </div>
  <div class="tiny muted" style="text-align:center;">数据保存在本浏览器，下次打开继续 · <a href="#" id="resetBtn">重置全部进度</a></div>
</div>
<script>
(function(){
  const DAYS = ['周一','周二','周三','周四','周五','周六','周日'];

  const P0_MONTHS = [
    { goal: "英语单词第1轮启动 + 语法框架；数学补函数/不等式/基础代数", word: "高频核心词 A 段", math: "函数与不等式" },
    { goal: "单词第1轮完成 + 语法重点；数学极限与连续、导数入门", word: "高频核心词 B 段", math: "极限与导数入门" },
    { goal: "单词第2轮启动 + 长难句专项；数学导数应用、不定积分", word: "二轮·易错词", math: "导数应用与积分" },
    { goal: "单词第2轮完成 + 阅读精读起步；数学定积分、多元微分", word: "二轮·巩固", math: "定积分与多元微分" },
    { goal: "单词第3轮 + 阅读精读；数学线代行列式、矩阵", word: "三轮·提速", math: "线代：行列式矩阵" },
    { goal: "单词维持 + 阅读做完近5年；数学线代向量、概率入门", word: "维持·盲点词", math: "线代向量+概率入门" },
    { goal: "单词维持 + 阅读二刷 + 作文素材；数学概率随机变量", word: "维持·高频回扣", math: "概率：随机变量" },
    { goal: "全科基础查漏 + 知识地图；数学三模块成套练习", word: "查漏·全表速扫", math: "三模块查漏练习" }
  ];
  const P0_WEEKDAY = [
    { label: "英语单词 APP 打卡（30min）", tag: "t-eng", tagText: "英语", focusKey: "word", focusPre: "今日背：" },
    { label: "数学：看1节课 + 跟做3-5道例题（60min）", tag: "t-math", tagText: "数学", focusKey: "math", focusPre: "本月章节：" },
    { label: "英语：语法1节 或 阅读精读1篇（45min）", tag: "t-eng", tagText: "英语", focus: "前4月主攻语法，后4月转阅读精读" },
    { label: "睡前：单词回顾 + 默写当日数学公式（15min）", tag: "t-rev", tagText: "回顾", focus: "保底项，再累也要做" }
  ];
  const P0_SAT = [
    { label: "本周数学错题重做（1.5h）", tag: "t-math", tagText: "数学", focusKey: "math", focusPre: "聚焦：" },
    { label: "英语阅读精读 2 篇并精析（1.5h）", tag: "t-eng", tagText: "英语", focus: "逐句拆解，整理生词与长难句" },
    { label: "单词 APP 打卡（复习为主）", tag: "t-eng", tagText: "英语", focusKey: "word", focusPre: "复习：" },
    { label: "整理本周错题本（30min）", tag: "t-rev", tagText: "回顾", focus: "分类归因，标记反复错的点" }
  ];
  const P0_SUN = [
    { label: "本周单词全部回顾（1h）", tag: "t-eng", tagText: "英语", focusKey: "word", focusPre: "整周复盘：" },
    { label: "数学本章思维导图 + 公式默写（1h）", tag: "t-math", tagText: "数学", focusKey: "math", focusPre: "画图：" },
    { label: "单词 APP 打卡（复习为主）", tag: "t-eng", tagText: "英语", focus: "巩固，不留欠账进下周" },
    { label: "复盘本周 + 微调下周计划（30min）", tag: "t-rev", tagText: "回顾", focus: "完成率<70%就减量，别硬扛" }
  ];

  const P1_MONTHS = [
    { name:"1月", goal:"数学强化全范围+大量做题；英语阅读强化；434主教材通读+建名词解释本", math:"数学强化·微积分全范围", eng:"阅读强化·每日2篇", major:"434通读第1遍·建名词本" },
    { name:"2月", goal:"数学强化继续；英语翻译专项；434主教材精读", math:"数学强化·线代概率", eng:"翻译专项", major:"434精读·补名词本" },
    { name:"3月", goal:"数学二轮；逻辑启动；434第2遍精读", math:"数学二轮·综合题", eng:"阅读+翻译保温", major:"434第2遍" },
    { name:"4月", goal:"数学专题突破；逻辑刷题；434真题高频考点；作文模板起步", math:"数学·薄弱专题突破", eng:"作文模板积累", major:"434真题高频点" },
    { name:"5月", goal:"396真题启动；434真题+答题模板；专业英语专项", math:"396真题·近5年", eng:"专业英语术语专项", major:"434真题+模板" },
    { name:"6月", goal:"396真题二刷+错题；434名词解释开背；英语二真题模考", math:"396真题二刷", eng:"英语二成套模考", major:"434名词解释·背第1遍" },
    { name:"7月", goal:"写作专项；434简答论述背诵；英语作文成篇", math:"396写作·论说文+论证", eng:"英语作文成篇练", major:"434简答论述背诵" },
    { name:"8月", goal:"政治启动；全科真题循环；434背诵第1轮", math:"政治强化+选择题", eng:"全科真题循环", major:"434背诵第1轮" },
    { name:"9月", goal:"关注最新大纲；政治刷题；396全真模考；434背诵第2轮", math:"396全真模考", eng:"政治选择题刷题", major:"434背诵第2轮·核对大纲" },
    { name:"10月", goal:"按模考定主攻；全科模考冲刺；政治分析题起步", math:"全科模考冲刺", eng:"政治分析题起步", major:"434查漏·定主攻校" },
    { name:"11-12月", goal:"政治分析题背诵；434三轮循环；作文翻译保温；对齐考试作息；初试", math:"真题再过+保温", eng:"政治分析题背诵", major:"434三轮循环·冲刺" }
  ];
  const P1_WEEKDAY = [
    { label: "英语：单词复习 + 阅读/翻译练习并精析（上午1）", tag:"t-eng", tagText:"英语", focusKey:"eng", focusPre:"本月：" },
    { label: "数学：1个专题做题 + 错题归因（上午2·黄金时段）", tag:"t-math", tagText:"数学", focusKey:"math", focusPre:"本月：" },
    { label: "434专业课：读书/背诵 + 更新名词解释本（下午1）", tag:"t-major", tagText:"专业课", focusKey:"major", focusPre:"本月：" },
    { label: "逻辑 或 写作（隔天轮换，下午2）", tag:"t-logic", tagText:"逻辑/写作", focus:"3月起逻辑，7月起加写作" },
    { label: "晚间：政治/专业英语/当日错题清算（19-21点）", tag:"t-pol", tagText:"政治等", focus:"8月起政治为主，之前补专业英语" }
  ];
  const P1_SUN = [
    { label: "本周全科错题重做（上午）", tag:"t-rev", tagText:"回顾", focus:"五科错题各过一遍" },
    { label: "半天模考（轮换科目，下午）", tag:"t-major", tagText:"模考", focus:"严格计时，模拟考场" },
    { label: "下周计划复盘 + 弱项标记", tag:"t-rev", tagText:"回顾", focus:"按模考分动态调整重心" },
    { label: "彻底休息半天", tag:"t-rev", tagText:"休息", focus:"全职最忌无休，保护后期状态" }
  ];

  const PHASES = [
    { weeks: 32, months: P0_MONTHS, weekday: P0_WEEKDAY, sat: P0_SAT, sun: P0_SUN, label: "在职打基础" },
    { weeks: 44, months: P1_MONTHS, weekday: P1_WEEKDAY, sat: P1_WEEKDAY, sun: P1_SUN, label: "全职冲刺" }
  ];

  function monthIdxFor(p, wk){ return p===0 ? Math.min(7, Math.floor((wk-1)/4)) : Math.min(10, Math.floor((wk-1)/4)); }
  function tasksFor(p, dayIdx){ const ph=PHASES[p]; if(dayIdx===6) return ph.sun; if(dayIdx===5) return ph.sat; return ph.weekday; }

  let state = { p: 0, wk: 1, day: 0, data: {} };

  function load(){ try { const r = localStorage.getItem('kaoyan_v2'); if(r) state = JSON.parse(r); } catch(e){} if(!state.data) state.data={}; render(); }
  function save(){ try { localStorage.setItem('kaoyan_v2', JSON.stringify(state)); } catch(e){} }

  function keyFor(p, wk, day){ return 'p'+p+'w'+wk+'d'+day; }
  function getDone(p, wk, day){ const n = tasksFor(p,day).length; return state.data[keyFor(p,wk,day)] || new Array(n).fill(false); }
  function setDone(p, wk, day, arr){ state.data[keyFor(p,wk,day)] = arr; }

  function computeTotal(){ let t=0; Object.values(state.data).forEach(a=>(a||[]).forEach(v=>{if(v)t++;})); return t; }
  function computeStreak(){ let s=0,p=state.p,w=state.wk,d=state.day; while(w>=1){ const a=state.data[keyFor(p,w,d)]; if(a&&a.some(v=>v)){s++;d--;if(d<0){d=6;w--;}} else break; } return s; }

  function focusText(t, m){ if(t.focus) return t.focus; if(t.focusKey&&m[t.focusKey]) return (t.focusPre||'')+m[t.focusKey]; return ''; }

  function render(){
    const ph = PHASES[state.p];
    if (state.wk > ph.weeks) state.wk = ph.weeks;
    const mi = monthIdxFor(state.p, state.wk);
    const m = ph.months[mi];

    document.querySelectorAll('#phaseToggle button').forEach(b => { b.className = (parseInt(b.dataset.p)===state.p)?'on':''; });
    document.getElementById('weekTitle').textContent = '第 ' + state.wk + ' 周';
    const mLabel = state.p===0 ? ('第 '+(mi+1)+' 月') : (m.name);
    document.getElementById('phaseLabel').textContent = ph.label + ' · ' + mLabel;
    document.getElementById('monthGoal').innerHTML = '<b style="font-weight:500"><i class="ti ti-target" style="vertical-align:-2px;margin-right:5px"></i>本月目标</b><br>' + m.goal;

    const seg = document.getElementById('daySeg'); seg.innerHTML='';
    DAYS.forEach((nm,i)=>{ const b=document.createElement('button'); b.textContent=nm; if(i===state.day)b.className='on'; b.onclick=()=>{state.day=i;render();}; seg.appendChild(b); });

    const isWeekend = state.day>=5;
    const hrs = state.p===0 ? (isWeekend?'（可增至4-5h）':'（工作日 2-3h）') : (state.day===6?'（含休息）':'（全职 8-10h）');
    document.getElementById('dayLabel').textContent = DAYS[state.day] + hrs;

    const tasks = tasksFor(state.p, state.day);
    const done = getDone(state.p, state.wk, state.day);
    const list = document.getElementById('taskList'); list.innerHTML='';
    tasks.forEach((t,i)=>{
      const row=document.createElement('div'); row.className='task'+(done[i]?' done':'');
      const ft=focusText(t,m);
      row.innerHTML='<div class="box'+(done[i]?' done':'')+'"><i class="ti ti-check"></i></div>'+
        '<div style="flex:1"><div class="label">'+t.label+'<span class="tag '+t.tag+'">'+t.tagText+'</span></div>'+
        (ft?'<div class="focus"><i class="ti ti-arrow-narrow-right" style="vertical-align:-2px"></i> '+ft+'</div>':'')+'</div>';
      row.onclick=()=>{ const cur=getDone(state.p,state.wk,state.day).slice(); cur[i]=!cur[i]; setDone(state.p,state.wk,state.day,cur); save(); render(); };
      list.appendChild(row);
    });

    const cnt = done.filter(Boolean).length;
    document.getElementById('dayCount').textContent = cnt+' / '+tasks.length;
    document.getElementById('dayBar').style.width = (cnt/tasks.length*100)+'%';

    const fb=document.getElementById('feedback'); fb.innerHTML='';
    if(cnt===tasks.length){
      fb.innerHTML='<div class="good"><i class="ti ti-circle-check" style="vertical-align:-2px;margin-right:5px"></i>今日全部完成，保持节奏！</div>';
    } else if(cnt>0){
      let msg='<div class="replan"><b style="font-weight:500"><i class="ti ti-alert-triangle" style="vertical-align:-2px;margin-right:5px"></i>未完成 '+(tasks.length-cnt)+' 项，重规划建议：</b><br>';
      if(state.p===0){
        if(!done[0]) msg+='• <b style="font-weight:500">单词是保底项，今天再累也要补完</b>——哪怕睡前10分钟。<br>';
        if(state.day<5){ msg+='• 未完成的数学/英语顺延到周六集中补（周末已留弹性）。<br>• 连续3天没完成数学课，说明单日量偏大，下周把1节拆成2天。'; }
        else { msg+='• 周末挑最重要1项补完即可，别全补，避免下周开局疲惫。'; }
      } else {
        msg+='• 全职阶段优先级：数学 > 434 > 英语 > 逻辑/写作 > 政治。时间不够时砍后面，保前面。<br>';
        msg+='• 未完成项当天晚间或次日晨补；连续掉同一科，说明该科需单独加时，下周调整时段分配。<br>';
        msg+='• 但别牺牲睡眠——全职是马拉松，状态崩了得不偿失。';
      }
      msg+='</div>'; fb.innerHTML=msg;
    }

    let wkDone=0,wkTotal=0;
    for(let d=0;d<7;d++){ wkTotal+=tasksFor(state.p,d).length; wkDone+=getDone(state.p,state.wk,d).filter(Boolean).length; }
    document.getElementById('sWeek').textContent = Math.round(wkDone/wkTotal*100)+'%';
    document.getElementById('sStreak').textContent = computeStreak();
    document.getElementById('sTotal').textContent = computeTotal();
  }

  document.querySelectorAll('#phaseToggle button').forEach(b=>{ b.onclick=()=>{ state.p=parseInt(b.dataset.p); state.wk=1; render(); }; });
  document.getElementById('prevWk').onclick=()=>{ if(state.wk>1){state.wk--;render();} };
  document.getElementById('nextWk').onclick=()=>{ if(state.wk<PHASES[state.p].weeks){state.wk++;render();} };
  document.getElementById('resetBtn').onclick=(e)=>{ e.preventDefault(); if(confirm('确定清空所有打卡记录？此操作不可恢复。')){ state={p:0,wk:1,day:0,data:{}}; save(); render(); } };

  load();
})();
</script>
</body>
</html>
