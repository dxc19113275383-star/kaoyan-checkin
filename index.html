<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>考研每日打卡 · 在职/全职双阶段</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="考研打卡">
<link rel="apple-touch-icon" href="./icon.svg">
<meta name="theme-color" content="#1d1c17">

<style>
  :root {
    --color-background-primary:#fff; --color-background-secondary:#f5f4f0; --color-background-tertiary:#faf9f6;
    --color-background-info:#E6F1FB; --color-background-warning:#FAEEDA; --color-background-success:#E1F5EE;
    --color-text-primary:#1a1a18; --color-text-secondary:#5F5E5A; --color-text-tertiary:#9b9a94;
    --color-text-info:#185FA5; --color-text-warning:#854F0B; --color-text-success:#0F6E56;
    --color-border-tertiary:rgba(0,0,0,.12); --color-border-secondary:rgba(0,0,0,.22);
    --color-border-warning:rgba(133,79,11,.4); --color-border-success:rgba(15,110,86,.4);
    --border-radius-md:8px; --border-radius-lg:12px;
    --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --bottom-nav-height: 56px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary:#26251f; --color-background-secondary:#302f28; --color-background-tertiary:#1d1c17;
      --color-text-primary:#f0efe9; --color-text-secondary:#b0afa8; --color-text-tertiary:#76756f;
      --color-border-tertiary:rgba(255,255,255,.14); --color-border-secondary:rgba(255,255,255,.26);
    }
    body { background:#1d1c17; }
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; overflow-x:hidden; }
  body { background:var(--color-background-tertiary); color:var(--color-text-primary);
    padding: calc(var(--safe-top) + 12px) 1rem calc(var(--bottom-nav-height) + var(--safe-bottom) + 16px) 1rem;
    min-height:100svh; }
  .wrap { max-width: 640px; margin: 0 auto; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 10px; }
  .muted { color: var(--color-text-secondary); }
  .tiny { font-size: 13px; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .task { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; min-height: 44px; }
  .task:last-child { border-bottom: none; }
  .box { width: 24px; height: 24px; flex-shrink: 0; border-radius: 6px; border: 1.5px solid var(--color-border-secondary); display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: background .15s, border-color .15s; }
  .box svg { color: #fff; opacity: 0; width: 16px; height: 16px; }
  .box.done { background: var(--color-text-info); border-color: var(--color-text-info); }
  .box.done svg { opacity: 1; }
  .task .label { font-size: 15px; line-height: 1.4; }
  .task .focus { font-size: 12.5px; color: var(--color-text-secondary); margin-top: 3px; line-height: 1.4; }
  .task.done .label { color: var(--color-text-tertiary); text-decoration: line-through; }
  .task.done .focus { color: var(--color-text-tertiary); }
  .tag { font-size: 11px; padding: 1px 7px; border-radius: 6px; margin-left: 6px; vertical-align: 1.5px; white-space: nowrap; }
  .t-eng { background: #E6F1FB; color: #0C447C; }
  .t-math { background: #FAEEDA; color: #854F0B; }
  .t-rev { background: #E1F5EE; color: #0F6E56; }
  .t-logic { background: #EEEDFE; color: #3C3489; }
  .t-write { background: #FBEAF0; color: #72243E; }
  .t-major { background: #FAECE7; color: #712B13; }
  .t-pol { background: #FCEBEB; color: #791F1F; }
  .bartrack { height: 7px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden; }
  .barfill { height: 100%; background: var(--color-text-info); width: 0%; transition: width .35s; }
  .navbtn { padding: 8px 14px; font-size: 14px; background:transparent; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); color:inherit; cursor:pointer; min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }
  .navbtn svg { width: 18px; height: 18px; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: .7rem .5rem; text-align: center; }
  .stat .n { font-size: 21px; font-weight: 500; }
  .stat .l { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .replan { background: var(--color-background-warning); border: 0.5px solid var(--color-border-warning); border-radius: var(--border-radius-md); padding: .8rem 1rem; font-size: 14px; line-height: 1.55; color: var(--color-text-warning); margin-top: .6rem; }
  .good { background: var(--color-background-success); border: 0.5px solid var(--color-border-success); border-radius: var(--border-radius-md); padding: .8rem 1rem; font-size: 14px; color: var(--color-text-success); margin-top: .6rem; }
  .seg { display: flex; gap: 0; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; }
  .seg button { border: none; border-radius: 0; border-right: 0.5px solid var(--color-border-secondary); font-size: 13px; padding: 7px 0; flex: 1; background: transparent; color:inherit; cursor:pointer; min-height: 44px; }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: var(--color-text-info); color: #fff; }
  .phaseToggle { display: flex; gap: 0; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; margin-bottom: 1rem; }
  .phaseToggle button { border: none; border-radius: 0; border-right: 0.5px solid var(--color-border-secondary); font-size: 14px; padding: 10px 0; flex: 1; background: transparent; font-weight: 500; color:inherit; cursor:pointer; min-height: 44px; }
  .phaseToggle button:last-child { border-right: none; }
  .phaseToggle button.on { background: var(--color-text-primary); color: var(--color-background-primary); }
  h2 { font-size: 18px; font-weight: 500; margin: 0; }
  .phase { font-size: 12px; color: var(--color-text-secondary); }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  .monthbox { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: .7rem .85rem; margin: 10px 0 0; font-size: 13px; line-height: 1.5; }
  .icon-mid { width: 20px; height: 20px; vertical-align: -4px; margin-right: 5px; stroke: currentColor; }
  .icon-sm { width: 16px; height: 16px; vertical-align: -3px; margin-right: 4px; }
  .icon-inline { width: 16px; height: 16px; vertical-align: -3px; }
  a { color: var(--color-text-info); }
  .offline-banner { display:none; background: var(--color-background-warning); color: var(--color-text-warning); text-align:center; padding:6px; font-size:13px; }
  .offline-banner.show { display:block; }
  .btn-icon { background: none; border: none; color: inherit; cursor: pointer; padding: 6px; border-radius: 6px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  .btn-icon svg { width: 18px; height: 18px; }
  .btn-sm { font-size: 13px; padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; min-height: 44px; }
  .btn-sm.danger { color: #c44; border-color: rgba(204,68,68,.4); }
  .editing .task { cursor: default; }
  .editing .box { cursor: pointer; }
  .task-actions { display: flex; gap: 4px; margin-left: auto; }
  .edit-form { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: .8rem; margin-top: 8px; }
  .edit-form input, .edit-form select { width: 100%; padding: 8px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; margin-bottom: 6px; font-family: var(--font-sans); }
  .hm-row { display: flex; gap: 3px; align-items: center; margin-bottom: 2px; }
  .hm-label { font-size: 11px; color: var(--color-text-tertiary); width: 32px; flex-shrink: 0; text-align: right; margin-right: 2px; }
  .hm-cell { width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0; }
  .hm-cell.hm-gray { background: #e5e4df; }
  .hm-cell.hm-red { background: #f28b82; }
  .hm-cell.hm-yellow { background: #fdd663; }
  .hm-cell.hm-green { background: #81c995; }
  .hm-cell.hm-darkgreen { background: #34a853; }
  .hm-cell.hm-today { box-shadow: 0 0 0 2px var(--color-text-info); }
  .hm-cell.hm-future { opacity: .3; }
  @media (prefers-color-scheme: dark) {
    .hm-cell.hm-gray { background: #3d3c37; }
    .hm-cell.hm-red { background: #8b3a35; }
    .hm-cell.hm-yellow { background: #7d6b1c; }
    .hm-cell.hm-green { background: #3a6b47; }
    .hm-cell.hm-darkgreen { background: #1e7a34; }
  }
  .hm-legend { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--color-text-tertiary); margin-top: 6px; justify-content: center; }
  .hm-legend span { display: flex; align-items: center; gap: 3px; }
  .hm-legend .hm-cell { width: 12px; height: 12px; }
  .note-history-item { padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; }
  .note-history-item:last-child { border-bottom: none; }
  .note-history-item .nh-date { font-size: 11px; color: var(--color-text-tertiary); }
  .note-history-item .nh-text { color: var(--color-text-secondary); margin-top: 2px; line-height: 1.4; }
  .tag-warn { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; padding: 2px 8px; border-radius: 10px; margin: 2px 4px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: var(--color-background-primary); border-radius: var(--border-radius-lg); padding: 1.5rem; max-width: 380px; width: 100%; }
  .modal h3 { margin: 0 0 .8rem; font-size: 17px; }
  .modal p { font-size: 14px; color: var(--color-text-secondary); margin: 0 0 1rem; }
  .modal .row { justify-content: flex-end; gap: 8px; }
  /* Bottom nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(--color-background-primary); border-top: 0.5px solid var(--color-border-tertiary); padding: 4px 0 var(--safe-bottom); z-index: 50; height: calc(var(--bottom-nav-height) + var(--safe-bottom)); box-sizing: border-box; }
  .bn-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 0; border: none; background: transparent; color: var(--color-text-tertiary); font-size: 11px; cursor: pointer; min-height: 48px; }
  .bn-btn.on { color: var(--color-text-info); }
  .bn-btn svg { width: 22px; height: 22px; }
  /* Resource cards */
  .res-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: .85rem 1rem; margin-bottom: 8px; cursor: pointer; }
  .res-card .res-title { font-size: 15px; font-weight: 500; }
  .res-card .res-meta { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .res-card .res-progress { margin-top: 6px; display: flex; align-items: center; gap: 8px; }
  .res-progress-bar { flex: 1; height: 4px; background: var(--color-background-secondary); border-radius: 2px; overflow: hidden; }
  .res-progress-fill { height: 100%; background: var(--color-text-info); border-radius: 2px; }
  .res-filter { padding: 5px 8px; border-radius: 6px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); font-size: 12px; font-family: var(--font-sans); }
  /* AI chat */
  .ai-msg { padding: .6rem .8rem; border-radius: var(--border-radius-md); margin-bottom: 6px; font-size: 14px; line-height: 1.55; }
  .ai-msg.user { background: var(--color-background-info); color: var(--color-text-info); text-align: right; }
  .ai-msg.bot { background: var(--color-background-secondary); }
  .ai-msg.bot h4 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
  .ai-msg.bot ul { margin: 4px 0; padding-left: 16px; }
  .ai-msg.bot li { margin-bottom: 2px; }
  /* Session confirm */
  .session-btn { font-size: 12px; padding: 5px 10px; border-radius: 14px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
  .session-btn:active { background: var(--color-background-secondary); }
</style>
</head>
<body>
<div class="offline-banner" id="offlineBanner">当前处于离线状态，数据保存在本地</div>

<div class="wrap">
  <h2 class="sr-only">考研备考每日打卡工具，含在职与全职两个阶段</h2>

  <!-- 阶段切换 -->
  <div class="phaseToggle" id="phaseToggle">
    <button data-p="0" class="on">在职打基础（约8个月）</button>
    <button data-p="1">全职冲刺（约11个月）</button>
  </div>

  <!-- 倒计时 -->
  <div class="card" id="countdownCard" style="text-align:center;padding:1rem;">
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
      <span class="tiny muted" style="margin-right:4px;">距2027年初试</span>
      <span id="countdownDays" style="font-size:28px;font-weight:600;color:var(--color-text-info);">—</span>
      <span class="tiny muted">天</span>
      <button class="btn-icon" id="changeExamDate" aria-label="修改考试日期" style="width:28px;height:28px;min-width:28px;min-height:28px;opacity:.5;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </div>

  <!-- 周/月导航 -->
  <div class="card">
    <div class="row" style="justify-content: space-between; margin-bottom: 4px;">
      <div>
        <h2 id="weekTitle">第 1 周</h2>
        <div class="phase" id="phaseLabel"></div>
      </div>
      <div class="row">
        <button class="btn-sm" id="jumpToday" style="display:none;font-size:12px;padding:4px 10px;min-height:32px;" title="跳转到今天">今天</button>
        <button class="btn-icon" id="setStartDate" aria-label="设置起始日期" style="width:32px;height:32px;min-width:32px;min-height:32px;opacity:.5;" title="设置起始日期后自动定位">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
        </button>
        <button class="navbtn" id="prevWk" aria-label="上一周">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="navbtn" id="nextWk" aria-label="下一周">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
    </div>
    <div class="monthbox" id="monthGoal"></div>
    <div class="seg" id="daySeg" style="margin-top: 12px;"></div>
  </div>

  <!-- 当日任务 -->
  <div class="card" id="taskCard">
    <div class="row" style="justify-content: space-between; margin-bottom: 10px;">
      <span class="tiny muted" id="dayLabel">周一</span>
      <div class="row" style="gap:6px;">
        <span class="tiny muted" id="dayCount">0 / 4</span>
        <button class="btn-icon" id="editToggle" aria-label="编辑任务" style="width:32px;height:32px;min-width:32px;min-height:32px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
    </div>
    <div id="taskList"></div>
    <div id="yesterdayReminder" style="display:none;"></div>
    <div id="dailyNote" style="margin-top:10px;display:none;">
      <div class="tiny muted" style="margin-bottom:4px;">✏️ 今日薄弱点记录</div>
      <div class="row" style="gap:6px;margin-bottom:6px;">
        <select id="noteSubject" style="padding:6px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans);">
          <option value="">选科目…</option>
          <option value="eng">英语</option>
          <option value="math">数学</option>
          <option value="major">专业课</option>
          <option value="logic">逻辑/写作</option>
          <option value="write">写作</option>
          <option value="pol">政治</option>
          <option value="other">其他</option>
        </select>
        <span class="tiny muted" id="noteSaved" style="white-space:nowrap;"></span>
      </div>
      <textarea id="noteInput" placeholder="记录今日最大薄弱点，如：排列组合公式记混了…" maxlength="100" rows="2"
        style="width:100%;padding:8px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans);resize:vertical;box-sizing:border-box;"></textarea>
    </div>
    <div class="bartrack" style="margin-top: 14px;"><div class="barfill" id="dayBar"></div></div>
    <div id="feedback"></div>
  </div>

  <!-- 统计 -->
  <div class="card">
    <div class="row" style="gap: 8px;">
      <div class="stat" style="flex:1;"><div class="n" id="sWeek">0%</div><div class="l">本周完成率</div></div>
      <div class="stat" style="flex:1;"><div class="n" id="sStreak">0</div><div class="l">连续打卡天</div></div>
      <div class="stat" style="flex:1;"><div class="n" id="sTotal">0</div><div class="l">累计完成</div></div>
    </div>
    <!-- 热力图 -->
    <div id="heatmap" style="margin-top:12px;"></div>
    <!-- 笔记回看 -->
    <div id="notesHistory" style="margin-top:10px;display:none;"></div>
  </div>

  <!-- 工具栏 -->
  <div class="tiny muted" style="text-align:center; line-height:2;margin-bottom:1rem;">
    数据保存在本浏览器，下次打开继续 ·
    <a href="#" id="exportBtn">导出</a> ·
    <a href="#" id="importBtn">导入</a> ·
    <a href="#" id="resetBtn">重置全部进度</a>
  </div>

  <!-- ====== 资料包页面 ====== -->
  <div id="pageResources" style="display:none;">
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:8px;">
        <h2>资料包</h2>
        <button class="btn-sm" id="addResourceBtn" style="background:var(--color-text-info);color:#fff;border-color:var(--color-text-info);">+ 新增</button>
      </div>
      <div class="row" style="gap:6px;margin-bottom:8px;flex-wrap:wrap;">
        <select id="resFilterSubject" class="res-filter"><option value="">全部科目</option><option value="eng">英语</option><option value="math">数学</option><option value="logic">逻辑/写作</option><option value="write">写作</option><option value="major">专业课</option><option value="pol">政治</option><option value="other">其他</option></select>
        <select id="resFilterType" class="res-filter"><option value="">全部类型</option><option value="video">视频</option><option value="pdf">PDF</option><option value="doc">文档</option><option value="link">链接</option><option value="image">图片</option><option value="folder">文件夹</option></select>
      </div>
    </div>
    <div id="resourceList"></div>
    <!-- Resource editor -->
    <div class="modal-overlay" id="resEditor" style="display:none;">
      <div class="modal" style="max-width:420px;max-height:90vh;overflow-y:auto;">
        <h3 id="resEditorTitle">新增资源</h3>
        <input id="resTitle" placeholder="标题" maxlength="60"><br>
        <select id="resSubject"><option value="eng">英语</option><option value="math">数学</option><option value="logic">逻辑/写作</option><option value="write">写作</option><option value="major">专业课</option><option value="pol">政治</option><option value="other">其他</option></select><br>
        <input id="resUrl" placeholder="链接（URL）"><br>
        <select id="resType"><option value="video">视频</option><option value="pdf">PDF</option><option value="doc">文档</option><option value="link">链接</option><option value="image">图片</option><option value="folder">文件夹</option></select><br>
        <input id="resCategory" placeholder="分类标签（如：网课、真题、讲义）"><br>
        <input id="resProvider" placeholder="提供方（如：B站、百度网盘）"><br>

    if (!arr) return new Array(tasks.length).fill(false);
    // Handle length mismatch (task templates changed or custom tasks)
    if (arr.length < tasks.length) {

      while (a2.length < tasks.length) a2.push(false);
      return a2;
    }
    return arr;
  }

    const target = new Date(dateStr + 'T00:00:00');
    if (isNaN(target.getTime())) return null;
    const now = new Date();
    now.setHours(0,0,0,0);
    return Math.ceil((target - now) / 86400000);
  }

  // ===== AUTO-POSITION =====
  function calcPosition(startDateStr) {
    const start = new Date(startDateStr + 'T00:00:00');
    const now = new Date();
    now.setHours(0,0,0,0);
    const elapsed = Math.floor((now - start) / 86400000);
    if (elapsed < 0) return { p: 0, wk: 1, day: now.getDay() === 0 ? 6 : now.getDay() - 1 };
    // Phase 0: 32 weeks = 224 days
    const P0_DAYS = PHASES[0].weeks * 7;
    if (elapsed < P0_DAYS) {
      return { p: 0, wk: Math.min(Math.floor(elapsed/7)+1, PHASES[0].weeks), day: now.getDay()===0?6:now.getDay()-1 };
    }
    const remaining = elapsed - P0_DAYS;
    const wk1 = Math.min(Math.floor(remaining/7)+1, PHASES[1].weeks);
    return { p: 1, wk: wk1, day: now.getDay()===0?6:now.getDay()-1 };
  }

  // ===== HEATMAP =====
  function heatmapColor(cnt, total) {
    if (total === 0) return 'hm-gray';      // No tasks = no record
    const pct = cnt / total;
    if (pct === 0) return 'hm-red';          // 0%
    if (pct < 0.6) return 'hm-yellow';       // 1-59%
    if (pct < 0.9) return 'hm-green';        // 60-89%
    return 'hm-darkgreen';                    // 90-100%
  }

  function renderHeatmap() {
    const container = $('heatmap');
    const weeks = 4;
    let html = '<div class="tiny muted" style="margin-bottom:4px;">近4周热力图</div>';
    for (let wOffset = weeks - 1; wOffset >= 0; wOffset--) {
      let wk = state.wk - wOffset;
      let p = state.p;
      while (wk < 1) {
        if (p === 1) { p = 0; wk += PHASES[0].weeks; }
        else break;
      }
      if (wk < 1) continue;
      const label = (p===0?'在':'全') + wk + 'W';
      const todayP = state.p, todayWk = state.wk, todayDay = state.day;
      html += '<div class="hm-row"><span class="hm-label">'+label+'</span>';
      for (let d = 0; d < 7; d++) {
        const tasks = effectiveTasks(p, wk, d);
        const done = getDone(p, wk, d);
        const cnt = done.filter(Boolean).length;
        let cls = 'hm-cell ' + heatmapColor(cnt, tasks.length);
        if (p === todayP && wk === todayWk && d === todayDay) cls += ' hm-today';
        if (p === todayP && wk === todayWk && d > todayDay) cls += ' hm-future';
        html += '<div class="'+cls+'" title="'+DAYS[d]+': '+cnt+'/'+tasks.length+'"></div>';
      }
      html += '</div>';
    }
    html += '<div class="hm-legend">'+
      '<span><div class="hm-cell hm-gray"></div>无记录</span>'+
      '<span><div class="hm-cell hm-red"></div>0%</span>'+
      '<span><div class="hm-cell hm-yellow"></div><60%</span>'+
      '<span><div class="hm-cell hm-green"></div>60%+</span>'+
      '<span><div class="hm-cell hm-darkgreen"></div>90%+</span>'+
      '<span><div class="hm-cell hm-today" style="width:12px;height:12px;"></div>今天</span>'+
      '</div>';
    container.innerHTML = html;
  }

  // ===== BIAS WARNING =====
  // Subjects tracked for bias warning (exclude review tasks)
  const EXAM_TAGS = ['t-eng','t-math','t-major','t-logic','t-write','t-pol'];

  function getTagStats(daysBack) {
    const stats = {};
    for (let d = 0; d < daysBack; d++) {
      let wk = state.wk, p = state.p, day = state.day - d;
      while (day < 0) { day += 7; wk--; }
      if (wk < 1) continue;
      const tasks = effectiveTasks(p, wk, day);
      const done = getDone(p, wk, day);
      tasks.forEach((t, i) => {
        const tag = t.tag;
        if (!EXAM_TAGS.includes(tag)) return; // Skip non-exam tasks (t-rev etc.)
        if (!stats[tag]) stats[tag] = { total: 0, done: 0 };
        stats[tag].total++;
        if (done[i]) stats[tag].done++;
      });
    }
    return stats;
  }

  function countDaysWithData() {
    // Count unique days that have at least one completed task
    let count = 0;
    Object.values(state.data).forEach(arr => {
      if (arr && arr.some(v => v)) count++;
    });
    return count;
  }

  function renderBiasWarning(todayTasks, todayDone) {
    // Cold start: need at least 3 days with check-in data
    const daysWithData = countDaysWithData();
    if (daysWithData < 3) {
      return '<div class="monthbox" style="margin-top:8px;text-align:center;color:var(--color-text-secondary);">' +
        '📊 完成 3 天后开始生成偏科趋势</div>';
    }

    const tagStats = getTagStats(7);
    const warnings = [];
    const tagNames = { 't-eng':'英语', 't-math':'数学', 't-major':'专业课', 't-logic':'逻辑/写作', 't-pol':'政治', 't-write':'写作' };
    const suggestions = {
      't-eng': '建议明天把英语设为保底任务，只做30分钟单词，先恢复连续性。',
      't-math': '建议明天把数学设为保底任务，只做20分钟基础题，先恢复连续性。',
      't-major': '建议明天只读专业课教材15分钟，画一章思维导图即可。',
      't-logic': '建议明天只做5道逻辑题，找手感即可。',
      't-pol': '政治是后期科目，当前阶段可暂时降低优先级。',
      't-write': '建议明天写一段论说文开头即可，慢慢找回节奏。'
    };

    Object.entries(tagStats).forEach(([tag, s]) => {
      if (s.total < 2) return;
      const rate = s.done / s.total;
      if (rate < 0.4) warnings.push({ tag, rate, level: rate < 0.25 ? 'red' : 'yellow' });
    });

    if (warnings.length === 0) return '';

    // Check two consecutive weeks (only if not in week 1)
    const consecutiveWarnings = [];
    if (state.wk > 1 || state.p === 1) {
      // Get stats for previous 14 days for broader context
      const twoWeekStats = getTagStats(14);
      warnings.forEach(w => {
        const tw = twoWeekStats[w.tag];
        if (tw && tw.total >= 4 && tw.done/tw.total < 0.4) consecutiveWarnings.push(w);
      });
    }

    // Sort: red first, then consecutive, then yellow
    warnings.sort((a, b) => {
      const priority = (w) => {
        if (w.level === 'red') return 0;
        if (consecutiveWarnings.some(cw => cw.tag === w.tag)) return 1;
        return 2;
      };
      return priority(a) - priority(b);
    });

    // Limit to 2 warnings max
    const visible = warnings.slice(0, 2);
    const hidden = warnings.length - 2;

    let html = '';
    visible.forEach(w => {
      const icon = w.level === 'red' ? '🔴' : '🟡';
      const name = tagNames[w.tag] || w.tag;
      const pct = Math.round(w.rate * 100);
      const suggestion = suggestions[w.tag] || '建议明天优先补齐这个科目。';
      const isConsec = consecutiveWarnings.some(cw => cw.tag === w.tag);
      html += '<div class="replan" style="margin-top:6px;">' +
        icon + ' <b style="font-weight:500">' + name + ' 最近7天完成率 ' + pct + '%</b>' +
        (isConsec ? ' <span class="tag-warn t-pol">连续两周偏低</span>' : '') +
        '<br><span class="tiny">' + suggestion + '</span></div>';
    });

    if (hidden > 0) {
      html += '<div class="tiny muted" style="margin-top:6px;text-align:center;">还有 ' + hidden + ' 项提醒未展开</div>';
    }

    return html;
  }

  // ===== NOTES =====
  function getNote(dateKey) {
    return state.notes[dateKey] || null;
  }

  function saveNote(dateKey, weakSubject, text) {
    if (text.trim()) {
      state.notes[dateKey] = { weakSubject, text: text.trim(), createdAt: new Date().toISOString() };
    } else {
      delete state.notes[dateKey];
    }
    save();
  }

  function renderNotesHistory() {
    const container = $('notesHistory');
    const keys = Object.keys(state.notes).sort().reverse().slice(0, 5);
    if (keys.length === 0) { container.style.display = 'none'; return; }
    container.style.display = '';
    const subNames = { eng:'英语', math:'数学', major:'专业课', logic:'逻辑/写作', write:'写作', pol:'政治', other:'其他' };
    let html = '<div class="tiny muted" style="margin-bottom:6px;font-weight:500;">最近笔记</div>';
    keys.forEach(k => {
      const n = state.notes[k];
      const sub = (n && n.weakSubject) ? (subNames[n.weakSubject] || n.weakSubject) : '';
      html += '<div class="note-history-item"><div class="nh-date">' + k +
        (sub ? ' · <b style="font-weight:500">'+sub+'</b>' : '') + '</div>'+
        '<div class="nh-text">' + ((n && n.text) || '').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div></div>';
    });
    container.innerHTML = html;
  }

  // ===== YESTERDAY REMINDER =====
  function renderYesterdayReminder() {
    const dateKey = dateFor(state.p, state.wk, state.day);
    if (!dateKey) return '';
    // Get yesterday's date
    const d = new Date(dateKey + 'T00:00:00');
    d.setDate(d.getDate() - 1);
    const yKey = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const yNote = getNote(yKey);
    if (!yNote || !yNote.text) return '';
    const subNames = { eng:'英语', math:'数学', major:'专业课', logic:'逻辑/写作', write:'写作', pol:'政治', other:'' };
    const sub = subNames[yNote.weakSubject] || '';
    // Check if 3 consecutive days same weakSubject
    let streak = 1;
    for (let i = 2; i <= 3; i++) {
      const prev = new Date(d.getTime() - (i-1)*86400000);
      const pk = prev.getFullYear() + '-' + String(prev.getMonth()+1).padStart(2,'0') + '-' + String(prev.getDate()).padStart(2,'0');
      const pn = getNote(pk);
      if (pn && pn.weakSubject === yNote.weakSubject) streak++; else break;
    }
    let html = '<div class="monthbox" style="margin-top:8px;">';
    html += '<b style="font-weight:500">📝 昨日薄弱点：</b>' + (sub ? sub + ' — ' : '') + yNote.text + '</div>';
    if (streak >= 3) {
      html += '<div class="replan" style="margin-top:4px;">⚠️ <b style="font-weight:500">连续 ' + streak + ' 天提到' + sub + '薄弱</b>，建议降低其他任务，优先补' + sub + '。</div>';
    }
    return html;
  }

  // ===== RENDER =====
  function render() {
    const ph = PHASES[state.p];
    if (state.wk > ph.weeks) state.wk = ph.weeks;
    if (state.wk < 1) state.wk = 1;
    const mi = monthIdxFor(state.p, state.wk);
    const m = ph.months[mi];

    // Phase toggle
    phaseToggle.querySelectorAll('button').forEach(b => {
      b.className = (parseInt(b.dataset.p)===state.p)?'on':'';
    });

    // Countdown
    const remaining = daysUntil(state.examDate);
    const cd = $('countdownDays');
    if (remaining === null || remaining === undefined) {
      cd.textContent = '未设置';
      cd.style.color = 'var(--color-text-secondary)';
    } else if (remaining < 0) {
      cd.textContent = '已过';
      cd.style.color = 'var(--color-text-tertiary)';
    } else {
      cd.textContent = remaining;
      if (remaining > 180) cd.style.color = 'var(--color-text-info)';
      else if (remaining > 90) cd.style.color = '#d97706';
      else cd.style.color = '#dc2626';
    }

    // Start date auto-position
    const jumpBtn = $('jumpToday');
    if (state.startDate) {
      jumpBtn.style.display = '';
      const auto = calcPosition(state.startDate);
      jumpBtn.onclick = () => {
        state.p = auto.p; state.wk = auto.wk; state.day = auto.day; render();
      };
    } else {
      jumpBtn.style.display = 'none';
    }

    // Week
    weekTitle.textContent = '第 ' + state.wk + ' 周';
    const mLabel = state.p===0 ? ('第 '+(mi+1)+' 月') : (m.name);
    phaseLabel.textContent = ph.label + ' · ' + mLabel;
    monthGoal.innerHTML = I.target + '<b style="font-weight:500">本月目标</b><br>' + m.goal;

    // Day tabs
    daySeg.innerHTML = '';
    DAYS.forEach((nm, i) => {
      const b = document.createElement('button');
      b.textContent = nm;
      if (i === state.day) b.className = 'on';
      b.onclick = () => { state.day = i; render(); };
      daySeg.appendChild(b);
    });

    // Day label
    const isWeekend = state.day >= 5;
    const hrs = state.p===0 ? (isWeekend?'（可增至4-5h）':'（工作日 2-3h）') : (state.day===6?'（含休息）':'（全职 8-10h）');
    dayLabel.textContent = DAYS[state.day] + hrs;

    // Tasks
    const tasks = effectiveTasks(state.p, state.wk, state.day);
    const done = getDone(state.p, state.wk, state.day);
    const isEditing = taskList.parentElement.classList.contains('editing');

    taskList.innerHTML = '';
    tasks.forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'task' + (done[i] ? ' done' : '');
      const ft = focusText(t, m);

      let actionsHtml = '';
      if (isEditing) {
        actionsHtml = '<div class="task-actions">' +
          '<button class="btn-icon delete-task" data-i="'+i+'" aria-label="删除任务" style="width:36px;height:36px;min-width:36px;min-height:36px;">'+I.trash+'</button>' +
          '</div>';
      }

      row.innerHTML =
        '<div class="box'+(done[i]?' done':'')+'">'+I.check+'</div>'+
        '<div style="flex:1"><div class="label">'+t.label+'<span class="tag '+t.tag+'">'+t.tagText+'</span></div>'+
        (ft?'<div class="focus">'+I.arrowRight+' '+ft+'</div>':'')+'</div>'+
        actionsHtml;

      if (isEditing) {
        row.querySelector('.delete-task').onclick = (e) => { e.stopPropagation(); deleteTask(i); };
      } else {
        row.onclick = () => { toggleTask(i); };
      }
      taskList.appendChild(row);
    });

    // Add task button (edit mode)
    if (isEditing) {
      const addRow = document.createElement('button');
      addRow.className = 'btn-sm';
      addRow.style.cssText = 'width:100%;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:4px;';
      addRow.innerHTML = I.plus + ' 添加任务';
      addRow.onclick = showAddTaskForm;
      taskList.appendChild(addRow);
    }

    // Count & bar
    const cnt = done.filter(Boolean).length;
    dayCount.textContent = cnt + ' / ' + tasks.length;
    dayBar.style.width = (tasks.length ? cnt/tasks.length*100 : 0) + '%';

    // Yesterday weak point reminder
    const yesterdayHtml = renderYesterdayReminder();
    const yReminder = $('yesterdayReminder');
    if (yReminder) {
      yReminder.innerHTML = yesterdayHtml;
      yReminder.style.display = yesterdayHtml ? '' : 'none';
    }

    // Daily note (hide in edit mode)
    const noteBlock = $('dailyNote');
    const noteInput = $('noteInput');
    const noteSubject = $('noteSubject');
    const dateKey = dateFor(state.p, state.wk, state.day);
    if (isEditing || !dateKey) {
      noteBlock.style.display = 'none';
    } else {
      noteBlock.style.display = '';
      const curNote = getNote(dateKey);
      noteInput.value = curNote ? curNote.text : '';
      noteSubject.value = curNote ? (curNote.weakSubject || '') : '';
      $('noteSaved').textContent = curNote && curNote.text ? '✓ 已保存' : '';
    }

    // Feedback
    feedback.innerHTML = '';
    if (cnt === tasks.length && tasks.length > 0) {
      feedback.innerHTML = '<div class="good">'+I.circleCheck+' 今日全部完成，保持节奏！</div>';
    } else if (cnt > 0) {
      let msg = '<div class="replan"><b style="font-weight:500">'+I.alertTriangle+' 未完成 '+(tasks.length-cnt)+' 项，重规划建议：</b><br>';
      if (state.p === 0) {
        if (!done[0]) msg += '• <b style="font-weight:500">单词是保底项，今天再累也要补完</b>——哪怕睡前10分钟。<br>';
        if (state.day < 5) {
          msg += '• 未完成的数学/英语顺延到周六集中补（周末已留弹性）。<br>• 连续3天没完成数学课，说明单日量偏大，下周把1节拆成2天。';
        } else {
          msg += '• 周末挑最重要1项补完即可，别全补，避免下周开局疲惫。';
        }
      } else {
        msg += '• 全职阶段优先级：数学 > 434 > 英语 > 逻辑/写作 > 政治。时间不够时砍后面，保前面。<br>';
        msg += '• 未完成项当天晚间或次日晨补；连续掉同一科，说明该科需单独加时，下周调整时段分配。<br>';
        msg += '• 但别牺牲睡眠——全职是马拉松，状态崩了得不偿失。';
      }
      msg += '</div>';
      feedback.innerHTML = msg;
    }
    // Bias warning
    const biasHtml = renderBiasWarning(tasks, done);
    if (biasHtml) {
      const biasDiv = document.createElement('div');
      biasDiv.innerHTML = biasHtml;
      feedback.appendChild(biasDiv);
    }

    // Stats
    let wkDone = 0, wkTotal = 0;
    for (let d = 0; d < 7; d++) {
      const dt = effectiveTasks(state.p, state.wk, d);
      wkTotal += dt.length;
      wkDone += getDone(state.p, state.wk, d).filter(Boolean).length;
    }
    const weekPct = Math.round(wkTotal ? wkDone/wkTotal*100 : 0);
    const streak = computeStreak();
    const totalDone = computeTotal();
    sWeek.textContent = weekPct + '%';
    sStreak.textContent = streak;
    sTotal.textContent = totalDone;

    // Encouraging message when all stats are zero
    let statsHint = $('statsHint');
    if (!statsHint) {
      statsHint = document.createElement('div');
      statsHint.id = 'statsHint';
      statsHint.className = 'tiny muted';
      statsHint.style.cssText = 'text-align:center;margin-top:8px;';
      document.querySelector('#heatmap').before(statsHint);
    }
    if (weekPct === 0 && streak === 0 && totalDone === 0) {
      statsHint.textContent = '今天开始记录，完成第一项后统计会自动更新';
      statsHint.style.display = '';
    } else {
      statsHint.style.display = 'none';
    }

    // Heatmap
    renderHeatmap();
    // Notes history
    renderNotesHistory();

    // Update edit toggle icon
    const editToggle = $('editToggle');
    if (isEditing) {
      editToggle.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;"><path d="M5 12l5 5L20 7"/></svg>';
      editToggle.style.color = 'var(--color-text-info)';
    } else {
      editToggle.innerHTML = I.edit;
      editToggle.style.color = '';
    }
  }

  // ===== ACTIONS =====
  function toggleTask(i) {
    const tasks = effectiveTasks(state.p, state.wk, state.day);
    const cur = getDone(state.p, state.wk, state.day).slice();
    cur[i] = !cur[i];
    setDone(state.p, state.wk, state.day, cur);
    save();
    render();
  }

  function deleteTask(i) {
    const k = keyFor(state.p, state.wk, state.day);
    const tasks = effectiveTasks(state.p, state.wk, state.day);

    // If this is a custom task list, remove from it
    if (state.customTasks[k] && state.customTasks[k].length > 0) {
      const custom = state.customTasks[k].slice();
      custom.splice(i, 1);
      if (custom.length === 0) {
        delete state.customTasks[k];
      } else {
        state.customTasks[k] = custom;
      }
      // Also fix done array
      const d = (state.data[k] || []).slice();
      d.splice(i, 1);
      if (d.length > 0) state.data[k] = d; else delete state.data[k];
    } else {
      // It's a default task — hide it via deletedDefaults
      if (!state.deletedDefaults[k]) state.deletedDefaults[k] = [];
      const dd = state.deletedDefaults[k];
      // Extend array if needed
      while (dd.length <= i) dd.push(false);
      dd[i] = true;
    }
    save();
    render();
  }

  function showAddTaskForm() {
    const existing = taskList.querySelector('.edit-form');
    if (existing) existing.remove();

    const form = document.createElement('div');
    form.className = 'edit-form';
    form.innerHTML =
      '<input id="newTaskLabel" placeholder="任务名称" maxlength="60">'+
      '<select id="newTaskTag">'+
        '<option value="t-eng">英语</option>'+
        '<option value="t-math">数学</option>'+
        '<option value="t-major">专业课</option>'+
        '<option value="t-logic">逻辑/写作</option>'+
        '<option value="t-pol">政治</option>'+
        '<option value="t-rev">回顾/休息</option>'+
        '<option value="t-write">写作</option>'+
      '</select>'+
      '<input id="newTaskFocus" placeholder="聚焦提示（可选）" maxlength="80">'+
      '<div class="row" style="justify-content:flex-end;gap:8px;margin-top:6px;">'+
        '<button class="btn-sm" id="cancelAdd">取消</button>'+
        '<button class="btn-sm" id="confirmAdd" style="background:var(--color-text-info);color:#fff;border-color:var(--color-text-info);">添加</button>'+
      '</div>';
    taskList.appendChild(form);

    $('cancelAdd').onclick = () => form.remove();
    $('confirmAdd').onclick = () => {
      const label = $('newTaskLabel').value.trim();
      if (!label) { $('newTaskLabel').focus(); return; }
      const tag = $('newTaskTag').value;
      const tagText = $('newTaskTag').selectedOptions[0].text;
      const focusVal = $('newTaskFocus').value.trim();

      const newTask = { label, tag, tagText };
      if (focusVal) newTask.focus = focusVal;

      const k = keyFor(state.p, state.wk, state.day);
      if (!state.customTasks[k]) {
        // Seed from current effective tasks
        state.customTasks[k] = effectiveTasks(state.p, state.wk, state.day).map(t => ({...t}));
      }
      state.customTasks[k].push(newTask);
      // Extend done array
      const d = (state.data[k] || []).slice();
      d.push(false);
      state.data[k] = d;
      save();
      form.remove();
      render();
    };
    $('newTaskLabel').focus();
  }

  // ===== EXPORT / IMPORT =====
  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = new Date();
    const ds = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    a.href = url;

  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = () => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const raw = reader.result;
          const parsed = JSON.parse(raw);
          // Validate structure
          if (typeof parsed.p !== 'number' || typeof parsed.wk !== 'number' ||
              typeof parsed.day !== 'number' || typeof parsed.data !== 'object') {
            alert('文件格式不正确：缺少必要字段（p/wk/day/data）。');
            return;
          }
          if (!confirm('导入将覆盖当前所有打卡数据，确定继续？\n\n建议先导出备份。')) return;
          state = migrate(parsed);
          save();
          render();
          alert('数据导入成功！');
        } catch(e) {
          alert('文件解析失败：'+e.message);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

    const subNames = {eng:'英语',math:'数学',logic:'逻辑/写作',write:'写作',major:'专业课',pol:'政治',other:'其他'};
    const typeNames = {video:'🎬视频',pdf:'📄PDF',doc:'📝文档',link:'🔗链接',image:'🖼图片',folder:'📁文件夹'};

      html = '<div class="card" style="text-align:center;color:var(--color-text-tertiary);">暂无资料，点击"+ 新增"添加第一个</div>';
    }
    list.forEach(r => {
      const lastStudied = r.progress && r.progress.lastStudiedAt

      html += '<div class="res-card" onclick="window._openResource(\''+r.id+'\')">' +

        '</div>' +

  function buildAIContext(mode, question) {
    const ctx = {
      phase: state.p === 0 ? '在职打基础' : '全职冲刺',
      week: state.wk,
      day: DAYS[state.day],
      todayTasks: effectiveTasks(state.p, state.wk, state.day).map((t,i) => {
        const d = getDone(state.p,state.wk,state.day); return t.label + (d[i]?' ✅':' ⬜');
      }),
      biasWarnings: (function(){
        const s = getTagStats(7); const w = [];
        Object.entries(s).forEach(([tag,st])=>{
          if(st.total>=2 && st.done/st.total<0.4) w.push(tag+':'+Math.round(st.done/st.total*100)+'%');
        });
        return w;
      })(),
      examDate: state.examDate,
      daysUntil: daysUntil(state.examDate),
      mode: mode,
      question: question
    };

  // ===== AI SEND (real API with mock fallback) =====
  async function sendAIMsg() {
    const input = $('aiInput');
    const question = input.value.trim();
    if (!question) return;
    const ctx = buildAIContext(aiMode, question);

    // Show loading
    $('aiStatus').textContent = '思考中…';
    $('aiSend').disabled = true;
    $('aiInput').disabled = true;

    let reply;
    let fromApi = false;

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: aiMode, question, context: ctx })
      });
      if (resp.ok) {
        const data = await resp.json();
        if (data.reply) { reply = data.reply; fromApi = true; }
      }
      if (!reply) {
        const data = await resp.json().catch(() => ({}));
        if (data.error) console.warn('[AI API]', data.error);
      }
    } catch(e) {
      console.warn('[AI] API unreachable, using offline demo:', e.message);
    }

    // Fallback to mock if API failed
    if (!reply) {
      reply = mockChat(ctx);
      $('aiMockNote').style.display = '';
    } else {
      $('aiMockNote').style.display = 'none';
    }

    state.aiChats.push({ q: question, a: reply, mode: aiMode, ts: new Date().toISOString(), fromApi });
    if (state.aiChats.length > 50) state.aiChats = state.aiChats.slice(-50);

    input.value = '';
    renderAI();

    $('aiSend').disabled = false;
    $('aiInput').disabled = false;
    $('aiInput').focus();
  }

    else {
      if (typeof state.p !== 'number' || state.p < 0 || state.p > 1) { state.p = 0; issues.push('state.p→0'); }
      if (typeof state.wk !== 'number' || state.wk < 1) { state.wk = 1; issues.push('state.wk→1'); }
      if (typeof state.day !== 'number' || state.day < 0 || state.day > 6) { state.day = 0; issues.push('state.day→0'); }
      if (!state.examDate) { state.examDate = '2027-12-25'; issues.push('examDate→default'); }
      if (!state.data) { state.data = {}; issues.push('data→{}'); }
      if (!Array.isArray(state.resources)) { state.resources = []; issues.push('resources→[]'); }
      if (!Array.isArray(state.studySessions)) { state.studySessions = []; issues.push('sessions→[]'); }
      if (!Array.isArray(state.aiChats)) { state.aiChats = []; issues.push('aiChats→[]'); }
      if (!state.notes) { state.notes = {}; issues.push('notes→{}'); }
    }
    if (issues.length) console.warn('[数据自检]', issues.join('; '));
    else console.log('[数据自检] OK');
    save();
  })();

  // --- render with DOM self-check ---
  try { render(); } catch(e) {
    console.error('[渲染失败]', e);
    document.querySelector('.wrap').innerHTML =
      '<div class="card" style="text-align:center;padding:2rem;color:#c44;">'+
      '<h3>渲染失败</h3><p>'+e.message+'</p>'+
      '<p class="tiny">请导出数据后联系修复</p></div>';
  }

  // --- DOM self-check (runs after render) ---
  setTimeout(function() {
    const results = [];
    const bt = document.body.innerText || '';
    const tasks = effectiveTasks(state.p, state.wk, state.day);
    const boxes = document.querySelectorAll('#taskList .box');
    const labels = document.querySelectorAll('#taskList .label');

    if (bt.includes('距2027年初试')) results.push('✅ 倒计时区域');
    else results.push('❌ 倒计时区域缺失');
    if (!bt.includes('— 天')) results.push('✅ 倒计时有数字');
    else results.push('❌ 倒计时仍为"—"');
    if (bt.includes('本月目标')) results.push('✅ 本月目标');
    else results.push('❌ 本月目标空白');
    DAYS.forEach(function(d) { if (bt.includes(d)) results.push('✅ tab:'+d); else results.push('❌ tab:'+d+' 缺失'); });
    if (boxes.length === tasks.length) results.push('✅ checkbox:'+boxes.length);
    else results.push('❌ checkbox:'+boxes.length+'/期望'+tasks.length);
    if (labels.length === tasks.length) results.push('✅ 任务label:'+labels.length);
    else results.push('❌ 任务label:'+labels.length+'/期望'+tasks.length);
    if (document.getElementById('prevWk')) results.push('✅ 上一周按钮');
    else results.push('❌ 上一周按钮缺失');
    if (document.getElementById('nextWk')) results.push('✅ 下一周按钮');
    else results.push('❌ 下一周按钮缺失');
    if (document.querySelector('#phaseToggle button')) results.push('✅ 阶段切换');
    else results.push('❌ 阶段切换缺失');

    console.log('[DOM自检]', results.join(' | '));
    var failCount = results.filter(function(r){return r.indexOf('❌')>=0;}).length;
    if (failCount === 0) console.log('[DOM自检] ✅ 全部通过 ('+results.length+'项)');
    else console.error('[DOM自检] ❌ '+failCount+'/'+results.length+' 项失败');
  }, 100);

  // Hide resource/AI pages on startup
  ['pageResources','pageAI'].forEach(function(id) { var el = $(id); if(el) el.style.display = 'none'; });
})();
</script>
</body>
</html>
